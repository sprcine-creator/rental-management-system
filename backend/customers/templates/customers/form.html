{% extends "layouts/base.html" %}

{% block page_title %}
Customer
{% endblock %}

{% block content %}

{% include "components/page_header.html" with title="Customer" subtitle="Add or edit customer details" %}

<form method="post">

    {% csrf_token %}

    <div class="card shadow-sm">

        <div class="card-body">

            {{ form.as_p }}

        </div>

        <div class="card-footer text-end">

            <button
                type="submit"
                class="btn btn-primary">

                Save Customer

            </button>

        </div>

    </div>

</form>

{% endblock %}
